<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playnite Extensions Store — Sassoanarchico</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; margin: 0;
      background: linear-gradient(135deg, #155799, #159957);
      color: #fff;
    }
    .loader { text-align: center; }
    .loader h1 { font-size: 1.6rem; margin-bottom: .5rem; }
    .loader p { font-size: 1rem; opacity: .85; }
    .lang-picker { margin-top: 2rem; }
    .lang-picker a {
      display: inline-block; margin: .3rem .4rem;
      padding: .5rem 1rem; border-radius: 6px;
      background: rgba(255,255,255,.15); color: #fff;
      text-decoration: none; font-size: .95rem;
      transition: background .2s;
    }
    .lang-picker a:hover { background: rgba(255,255,255,.3); }
  </style>
  <script>
    (function () {
      var supported = { en: 'en', it: 'it', es: 'es', fr: 'fr', de: 'de' };
      var saved = localStorage.getItem('preferredLang');
      if (saved && supported[saved]) {
        window.location.replace(saved + '/');
        return;
      }
      var langs = (navigator.languages || [navigator.language || navigator.userLanguage || 'en']);
      for (var i = 0; i < langs.length; i++) {
        var code = langs[i].substring(0, 2).toLowerCase();
        if (supported[code]) {
          window.location.replace(code + '/');
          return;
        }
      }
      window.location.replace('en/');
    })();
  </script>
</head>
<body>
  <div class="loader">
    <h1>🎮 Playnite Extensions Store</h1>
    <p>Detecting your language…</p>
    <noscript>
      <div class="lang-picker">
        <p>Choose your language:</p>
        <a href="en/">🇬🇧 English</a>
        <a href="it/">🇮🇹 Italiano</a>
        <a href="es/">🇪🇸 Español</a>
        <a href="fr/">🇫🇷 Français</a>
        <a href="de/">🇩🇪 Deutsch</a>
      </div>
    </noscript>
  </div>
</body>
</html>
